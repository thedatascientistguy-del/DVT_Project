<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chart 14 - Renewable Growth</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0b0f1a;
            color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        #chart-container {
            width: 800px;
            height: 500px;
            margin: 0 auto;
            background-color: #111827;
            border-radius: 8px;
            padding: 20px;
        }
        .controls {
            width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #111827;
            border-radius: 8px;
        }
        select {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #1f2937;
            background-color: #0b0f1a;
            color: #e5e7eb;
            margin-left: 10px;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Chart 14: Renewable Energy Growth Rate</h1>
    
    <div class="controls">
        <label for="country-select">Country:</label>
        <select id="country-select">
            <option value="All Countries">All Countries</option>
        </select>
    </div>
    
    <div id="chart-container"></div>
    
    <script type="module">
        import renderRenewableGrowth from './js/charts/renewableGrowth.js';
        import { loadEnergyData } from './js/dataLoader.js';
        
        async function init() {
            try {
                // Load data
                const data = await loadEnergyData();
                console.log('Data loaded:', data.length, 'records');
                
                // Populate country dropdown
                const countries = ['All Countries', ...Array.from(new Set(data.map(d => d.country))).sort()];
                const select = document.getElementById('country-select');
                countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    select.appendChild(option);
                });
                
                // Initial filter state
                let filterState = {
                    country: 'All Countries',
                    yearRange: [2000, 2019]
                };
                
                // Render chart
                const chart = renderRenewableGrowth('#chart-container', data, filterState);
                
                // Handle country change
                select.addEventListener('change', (e) => {
                    filterState.country = e.target.value;
                    chart.update(data, filterState);
                    console.log('Country changed to:', filterState.country);
                });
                
                console.log('✓ Chart 14 initialized successfully');
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('chart-container').innerHTML = 
                    `<div style="color: #ef4444; padding: 20px;">Error: ${error.message}</div>`;
            }
        }
        
        init();
    </script>
</body>
</html>
