<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test: Global Energy Trend Chart</title>
  <style>
    :root {
      --color-background: #0b0f1a;
      --color-panel: #111827;
      --color-text: #e5e7eb;
      --color-text-muted: #9ca3af;
      --color-border: #1f2937;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--color-background);
      color: var(--color-text);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .description {
      color: var(--color-text-muted);
      margin-bottom: 30px;
    }
    
    .controls {
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .control-group {
      margin-bottom: 15px;
    }
    
    .control-group:last-child {
      margin-bottom: 0;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: var(--color-text-muted);
    }
    
    select {
      width: 100%;
      padding: 8px 12px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text);
      font-size: 14px;
    }
    
    .chart-container {
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 20px;
      min-height: 400px;
    }
    
    #chart {
      width: 100%;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    .status-item {
      margin-bottom: 5px;
    }
    
    .error {
      color: #ef4444;
      padding: 15px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chart 1: Global Energy Consumption Trend</h1>
    <p class="description">Testing the line chart implementation with filter controls</p>
    
    <div id="error-container"></div>
    
    <div class="controls">
      <div class="control-group">
        <label for="country-select">Country:</label>
        <select id="country-select">
          <option value="All Countries">All Countries</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="year-range">Year Range: <span id="year-range-label">2000 - 2019</span></label>
        <div style="display: flex; gap: 10px; align-items: center;">
          <input type="number" id="year-min" value="2000" min="2000" max="2019" 
                 style="width: 80px; padding: 8px; background: var(--color-background); 
                        border: 1px solid var(--color-border); border-radius: 4px; 
                        color: var(--color-text);">
          <span>to</span>
          <input type="number" id="year-max" value="2019" min="2000" max="2019" 
                 style="width: 80px; padding: 8px; background: var(--color-background); 
                        border: 1px solid var(--color-border); border-radius: 4px; 
                        color: var(--color-text);">
        </div>
      </div>
    </div>
    
    <div class="chart-container">
      <div id="chart"></div>
    </div>
    
    <div class="status">
      <div class="status-item"><strong>Status:</strong> <span id="status-text">Loading...</span></div>
      <div class="status-item"><strong>Data Points:</strong> <span id="data-points">-</span></div>
      <div class="status-item"><strong>Selected Country:</strong> <span id="selected-country">-</span></div>
      <div class="status-item"><strong>Year Range:</strong> <span id="selected-years">-</span></div>
    </div>
  </div>
  
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module">
    import { loadEnergyData } from './js/dataLoader.js';
    import { renderGlobalEnergyTrend } from './js/charts/globalEnergyTrend.js';
    import { getUniqueCountries } from './js/utils.js';
    
    let chart = null;
    let data = null;
    let filterState = {
      country: 'All Countries',
      yearRange: [2000, 2019]
    };
    
    async function init() {
      try {
        // Load data
        updateStatus('Loading data...', 'loading');
        data = await loadEnergyData();
        
        if (!data || data.length === 0) {
          throw new Error('No data loaded');
        }
        
        updateStatus('Data loaded successfully', 'success');
        
        // Populate country dropdown
        const countries = getUniqueCountries(data);
        const countrySelect = document.getElementById('country-select');
        
        countries.forEach(country => {
          const option = document.createElement('option');
          option.value = country;
          option.textContent = country;
          countrySelect.appendChild(option);
        });
        
        // Initialize chart
        chart = renderGlobalEnergyTrend('#chart', data, filterState);
        
        if (!chart) {
          throw new Error('Chart initialization failed');
        }
        
        updateStatus('Chart rendered successfully', 'success');
        updateStatusInfo();
        
        // Setup event listeners
        setupEventListeners();
        
      } catch (error) {
        console.error('Initialization error:', error);
        showError(error.message);
        updateStatus('Initialization failed', 'error');
      }
    }
    
    function setupEventListeners() {
      // Country selection
      document.getElementById('country-select').addEventListener('change', (e) => {
        filterState.country = e.target.value;
        updateChart();
      });
      
      // Year range inputs
      document.getElementById('year-min').addEventListener('change', (e) => {
        const minYear = parseInt(e.target.value);
        if (minYear <= filterState.yearRange[1]) {
          filterState.yearRange[0] = minYear;
          document.getElementById('year-range-label').textContent = 
            `${filterState.yearRange[0]} - ${filterState.yearRange[1]}`;
          updateChart();
        } else {
          e.target.value = filterState.yearRange[0];
        }
      });
      
      document.getElementById('year-max').addEventListener('change', (e) => {
        const maxYear = parseInt(e.target.value);
        if (maxYear >= filterState.yearRange[0]) {
          filterState.yearRange[1] = maxYear;
          document.getElementById('year-range-label').textContent = 
            `${filterState.yearRange[0]} - ${filterState.yearRange[1]}`;
          updateChart();
        } else {
          e.target.value = filterState.yearRange[1];
        }
      });
    }
    
    function updateChart() {
      if (chart && data) {
        updateStatus('Updating chart...', 'loading');
        chart.update(data, filterState);
        updateStatus('Chart updated', 'success');
        updateStatusInfo();
      }
    }
    
    function updateStatus(message, type) {
      const statusText = document.getElementById('status-text');
      statusText.textContent = message;
      statusText.style.color = 
        type === 'error' ? '#ef4444' : 
        type === 'success' ? '#10b981' : 
        '#f59e0b';
    }
    
    function updateStatusInfo() {
      // Calculate data points for current filter
      const filtered = data.filter(d => 
        (filterState.country === 'All Countries' || d.country === filterState.country) &&
        d.year >= filterState.yearRange[0] && 
        d.year <= filterState.yearRange[1]
      );
      
      document.getElementById('data-points').textContent = filtered.length;
      document.getElementById('selected-country').textContent = filterState.country;
      document.getElementById('selected-years').textContent = 
        `${filterState.yearRange[0]} - ${filterState.yearRange[1]}`;
    }
    
    function showError(message) {
      const errorContainer = document.getElementById('error-container');
      errorContainer.innerHTML = `
        <div class="error">
          <strong>Error:</strong> ${message}
        </div>
      `;
    }
    
    // Initialize on load
    init();
  </script>
</body>
</html>
